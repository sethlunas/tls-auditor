server {
    listen 443 ssl; # listen on port 443 (standard HTTPS) using SSL/TLS

    server_name hardened-server; # name of this server

    ssl_certificate     /etc/nginx/certs/cert.pem; # path to cert inside container
    ssl_certificate_key /etc/nginx/certs/key.pem; # path to private key inside container

    # only allow modern, secure protocol versions
    ssl_protocols TLSv1.2 TLSv1.3;

    # only allow strong cipher suites - no weak or deprecated options
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on; # server picks the cipher, not the client

    # additional hardening
    ssl_session_timeout 1d;     # session cache expires after 1 day
    ssl_session_cache shared:SSL:10m; # shared cache across worker processes
    ssl_session_tickets off;    # disable session tickets, improves forward secrecy

    location / {
        return 200 'hardened server ok'; # return a simple response to any request
        add_header Content-Type text/plain; # tell the client this is plain text
    }
}