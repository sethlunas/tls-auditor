server {
    listen 443 ssl; # listen on port 443 (standard HTTPS) using SSL/TLS
    
    server_name weak-server; # name of this server

    ssl_certificate         /etc/nginx/certs/cert.pem; # path to cert inside container
    ssl_certificate_key     /etc/nginx/certs/key.pem; # path to private key inside container 

    # deliberately enable weak/deprecated protocol versions for testing
    ssl_protocols   TLSv1 TLSv1.1 TLSv1.2;

    # deliberately include weak cipher suites that the scanner should flag
    # RC4, DES, 3DES are all broken by modern standards
    ssl_ciphers     HIGH:RC4:DES:3DES:+NULL:!aNULL:!eNULL;
    ssl_prefer_server_ciphers on; # server picks the cipher, not the client

    location / {
        return 200 'weak server ok'; # return a simple response to any request
        add_header Content-Type text/plain; # tell the client this is plain text
    }
}